<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: 'Segoe UI', sans-serif;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    .content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 1;
    }

    h1 {
        font-size: 40px;
        color: #ff4da6;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        background: #ff4da6;
        color: white;
        cursor: pointer;
        margin-top: 20px;
    }

    .message {
        display: none;
        margin-top: 20px;
        font-size: 18px;
        max-width: 400px;
    }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="content">
    <h1>Happy Birthday ❤️</h1>
    <h2>Nur Atiqah Alya</h2>

    <button onclick="showMessage()">Click for Surprise 💌</button>

    <div class="message" id="msg">
        You are the most special person in my life 💖<br><br>
        Thank you for being with me through everything.<br>
        I’m so lucky to have you 🥺<br><br>
        I hope this year brings you happiness, love, and success 🎉<br><br>
        I love you ❤️
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "NURATIQAHALYA❤★0123456789";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = Math.random() * canvas.height;
}

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff4da6";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 35);

function showMessage() {
    document.getElementById("msg").style.display = "block";
}

// Resize fix
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
